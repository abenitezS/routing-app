<div class="productos-container">

  <div class="header">
    <h2>📦 Productos</h2>
    <p>Consulta el catálogo de productos disponibles.</p>
  </div>

  <div class="tabla-wrapper">

    <table class="tabla-productos">

      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Precio</th>
          <th>Acción</th>
        </tr>
      </thead>

      <tbody>
        @for (producto of productosList; track producto.id) {
        <tr>

          <td class="col-id">
            #{{ producto.id }}
          </td>

          <td class="col-nombre">
            {{ producto.nombre }}
          </td>

          <td class="col-precio">
            {{ producto.precio | currency }}
          </td>

          <td>
            <button
              class="btn-detalle"
              [routerLink]="['/productos', producto.id]">
              🔍 Ver detalle
            </button>
          </td>

        </tr>
        }
      </tbody>

    </table>

  </div>

</div>
