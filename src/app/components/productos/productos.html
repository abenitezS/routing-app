<h2 class="form-title">Productos</h2>

<table class ="tabla-productos" border="1">

  <tr class="table-header">
    <th>ID</th>
    <th>Nombre</th>
    <th>Precio</th>
    <th>Acción</th>
  </tr>

  @for (producto of productos; track producto.id) {
  <tr class="table-row">

    <td class="col-id">{{ producto.id }}</td>

    <td class="col-nombre">{{ producto.nombre }}</td>

    <td class="col-precio">{{ producto.precio | currency }}</td>

     <td>


     <button class="btn btn-primary"
        [routerLink]="['/productos', producto.id]">
        Ver detalle
      </button>
    </td> 

  </tr>
  }
</table>
