<div class="usuarios-container">

  <div class="header">
    <h2>👥 Usuarios</h2>
    <p>Listado de usuarios registrados en la aplicación.</p>
  </div>

  <div class="usuarios-grid">
    @for (usuario of usuarios; track usuario) {
      <div class="usuario-card">
        <div class="avatar">
          {{ usuario.charAt(0).toUpperCase() }}
        </div>

        <div class="info">
          <h3>{{ usuario }}</h3>
          <p>Usuario activo</p>
        </div>
      </div>
    }
  </div>

</div>
